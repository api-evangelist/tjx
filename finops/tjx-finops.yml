description: 'FOCUS-aligned FinOps placeholder for TJX Companies: an off-price retail holding company
  with no public developer program or vendor-published rate card.'
sources:
  - https://www.tjx.com/
  - https://focus.finops.org/focus-specification/v1-3/
notes: TJX is the consumer of vendor APIs, not a publisher of them. There is no TJX developer invoice
  to model; FinOps shape is a placeholder until any internal vendor-portal surface is documented externally.
