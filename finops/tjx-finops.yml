meters:
  - name: vendor_portal_transactions
    unit: varies
    aggregation: sum
    dimensions:
      - vendor
      - banner
principles:
  - name: Visibility
    description: TJX publishes no developer telemetry; visibility is internal vendor-portal reporting,
      not a vendor-issued usage API.
  - name: Allocation
    description: Vendor and EDI integration costs land on the supply-chain or merchandising P&L for the
      relevant banner (T.J. Maxx, Marshalls, HomeGoods, etc.).
  - name: Optimization
    description: Optimization is at the supplier-integration design level (EDI batch sizing, catalog
      sync cadence) rather than against any public API rate card.
  - name: Accountability
    description: TJX IT and merchandising leadership owns vendor integration spend; there is no external
      developer billing relationship.
