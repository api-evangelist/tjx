description: TJX Companies (parent of T.J. Maxx, Marshalls, HomeGoods, HomeSense, Sierra, and TK Maxx)
  is a brick-and-mortar retail holding company. It does not operate a public developer program or API
  marketplace. Any programmatic surface (vendor portals, EDI, supplier integrations) is internal or
  bilateral and does not have a published rate card.
sources:
